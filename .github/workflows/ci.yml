name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  preflight:
    name: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Workflow context
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "SHA: ${{ github.sha }}"

  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: preflight
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  build:
    name: build
    runs-on: ubuntu-latest
    needs: preflight
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  build-and-lint:
    name: build-and-lint
    runs-on: ubuntu-latest
    needs:
      - preflight
      - lint
      - build
    if: always()
    timeout-minutes: 5

    steps:
      - name: Write run summary
        run: |
          echo "## ClawDash CI Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| preflight | ${{ needs.preflight.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| lint | ${{ needs.lint.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| build | ${{ needs.build.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Node.js: \`20\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: \`${{ github.event_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Ref: \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail when a required job failed
        if: needs.lint.result != 'success' || needs.build.result != 'success'
        run: exit 1
